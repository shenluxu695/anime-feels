<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Output - Anime Feels</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0b0b12; color:#e0e0e0; }
.container { max-width:800px; margin:0 auto; padding:20px; }
h1 { font-size:2em; background:linear-gradient(135deg,#ff6b6b,#667eea); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:20px 0 10px; }
.video-wrap { background:#14141e; border-radius:16px; padding:20px; border:1px solid #1e1e2e; margin:20px 0; }
video { width:100%; border-radius:12px; max-height:70vh; }
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:15px 0; }
.stat { background:#14141e; border-radius:10px; padding:15px; border:1px solid #1e1e2e; text-align:center; }
.stat .n { font-size:24px; font-weight:bold; color:#fff; }
.stat .l { font-size:12px; color:#888; margin-top:4px; }
.gallery { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:15px 0; }
.gallery img { width:100%; aspect-ratio:9/16; object-fit:cover; border-radius:8px; border:1px solid #2a2a35; }
.back { display:inline-block; margin:10px 0; color:#667eea; text-decoration:none; }
footer { text-align:center; padding:30px 0; color:#444; font-size:0.85em; }
</style>
</head>
<body>
<div class="container">
<a href="/index.html" class="back">← Back</a>
<h1>Production Output</h1>
<p style="color:#888;">Latest video produced by the Anime Feels AI pipeline.</p>

<div class="video-wrap">
<video controls poster="/scenes/scene_01.jpg">
<source src="/latest_demo.mp4" type="video/mp4">
</video>
</div>

<div class="stats">
<div class="stat"><div class="n">30s</div><div class="l">Duration</div></div>
<div class="stat"><div class="n">14</div><div class="l">Shots</div></div>
<div class="stat"><div class="n">AI</div><div class="l">Pipeline v4</div></div>
</div>

<p style="color:#888;margin:20px 0;">This video was fully generated by our AI pipeline: script → voice → image → animation → compose. No manual editing required.</p>

<div class="gallery" id="sceneGallery"></div>

<footer>&copy; 2026 Anime Feels</footer>
</div>
<script>
fetch('/scenes_list.json').then(r=>r.json()).then(files=>{
  const g=document.getElementById('sceneGallery');
  files.forEach(f=>{
    const img=document.createElement('img');
    img.src='/scenes/'+f; img.loading='lazy';
    g.appendChild(img);
  });
});
</script>
</body>
</html>
