<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ee5a24"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff6b6b" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="5" y="5" rx="20" ry="20" width="90" height="90" fill="url(#bg)" stroke="url(#heart)" stroke-width="1.5"/>

  <!-- Subtle glow circle -->
  <circle cx="50" cy="42" r="20" fill="url(#glow)" opacity="0.3"/>

  <!-- Heart icon -->
  <g filter="url(#shadow)">
    <path d="M50 60 C50 60, 25 46, 25 35 C25 27, 32 22, 38 25 C42 27, 46 31, 50 36 C54 31, 58 27, 62 25 C68 22, 75 27, 75 35 C75 46, 50 60, 50 60Z"
          fill="url(#heart)" stroke="#fff" stroke-width="1.2" stroke-opacity="0.3"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="#fff" opacity="0.8">
    <circle cx="28" cy="30" r="1.5"/>
    <circle cx="72" cy="28" r="1.2"/>
    <circle cx="32" cy="68" r="1" opacity="0.5"/>
    <circle cx="68" cy="66" r="1.3" opacity="0.6"/>
  </g>

  <!-- Small sparkle crosses -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.7">
    <line x1="72" y1="25" x2="72" y2="31"/>
    <line x1="69" y1="28" x2="75" y2="28"/>
    <line x1="28" y1="27" x2="28" y2="33"/>
    <line x1="25" y1="30" x2="31" y2="30"/>
  </g>
</svg>
