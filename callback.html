<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback - Anime Feels</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0b0b12; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #14141e; border-radius: 16px; padding: 40px; max-width: 460px; width: 100%; border: 1px solid #1e1e2e; text-align: center; }
        .icon { font-size: 48px; margin-bottom: 15px; }
        h1 { font-size: 1.4em; margin-bottom: 8px; background: linear-gradient(135deg, #ff6b6b, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 14px; line-height: 1.6; }
        .loader { width: 40px; height: 40px; margin: 20px auto; border: 3px solid #1e1e2e; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back { margin-top: 20px; display: inline-block; color: #667eea; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔄</div>
        <h1>Completing Authorization</h1>
        <p>Exchanging OAuth code for TikTok access token...</p>
        <div class="loader"></div>
        <p style="font-size: 12px; color: #555;">This endpoint receives the authorization code from TikTok and calls the token exchange API. You will be redirected back to the dashboard once complete.</p>
        <a href="/index.html" class="back">← Back to Anime Feels</a>
    </div>
</body>
</html>
